<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=divece-width, initial-scale=1"/>
    <title> HTML5 Training</title>
  </head>
  <body>
    <section>
      <form action="http://jsptogo.herokuapp.com/jspsrc/formMselect1.jsp" method="post">
        <fieldset>
          <legend>Choose the meal</legend>
          <label for="timex">time</label>
          <select id="timex" name="mealtime">
            <option value="breakfast">breakfast</option>
            <option value="lunch">lunch</option>
            <option value="dinner" selected>dinner</option>
          </select>
          <label for="mealx">meal</label>
          <select id="mealx" name="meal" multiple>
            <option value="white rice">white rice</option>
            <option value="brown rice">brown rice</option>
            <option value="kimchi" selected>kimchi</option>
            <option value="ramen">ramen</option>
          <button type="submit">Add</button>
        </fieldset>
      </form>
    </section>
  </body>
</html>

<!doctype html> <!-- tableHw.html -->
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>HTML5 Table Test Training</title>
  </head>
  <body>
    <h1>Table Tag</h1>
    <table border=1>
      <thead>
        <tr>
          <th>Cell(1,1)</th><th>Cell(1,2)</th><th>Cell(1,3)</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td rowspan="3">Cell(2,1)</td><td>Cell(2,2)</td><td>Cell(2,3)</td>
        </tr>
        <tr>
          <td colspan="2">Cell(3,1)</td>
        </tr>
        <tr>
          <td>Cell(4,1)</td><td>Cell(4,2)</td>
        </tr>
      </tbody><hr/>
  </body>
</html>

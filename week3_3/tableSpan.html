<!doctype html> <!-- tableSpan.html -->
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <style> table, tr, th, td {
      border: 1px solid black; border-collapse: collapse;
      }
    </style>
    <title>HTML5 Table Span Training</title>
  </head>
  <body>
    <table>
      <tr>
        <th>Head(1,1)</th> <th>Head(1,2)</th> <th>Head(1,3)</th>
      </tr>
      <tr>
        <td rowspan="3">Data(2,1)(3,1)(4,1)</td>
        <td>Data(2,2)</td> <td>Data(2,3)</td>
      </tr>
       <tr>
        <td colspan="2">Data(3,2)(3,3)</td>
        <td>Data(4,2)</td> <td>Data(4,3)</td>
      </tr>
  </body>
</html>

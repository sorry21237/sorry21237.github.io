<!DOCTYPE html> <!-- basicSemantic.html -->
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <style>
      header, nav, section, article, aside, footer
      { border:1px solid gray; margin:5px; padding:8px; width:1000px; }
      section { width:750px; float:left; }
      section section {width:725px; float:left; }
      aside { width:211px; float:left; line-height:30px; }
      footer { height:50px; clear:both; }
      nav ul { margin:0; padding:0; }
      nav ul li {display:inline; margin:5px; }
      aside ul { margin:0; padding:0; }
      aside ul li { display: block; margin:5px; }
      a:link {
        color:blue; background-color:transparent; text-decoration:none; }
      a:visited {
        color:pink; background-color:transparent; text-decoration:none; }
      a:hover {
        color:red; background-color:transparent; text-decoration:underline; }
      a:active {
        color:blue; background-color:transparent; text-decoration:none; }
    </style>
    <title>Semantic Training</title>
  </head>
  <body>
    <header>
      <h2>Welcome to training</h2>
    </header>
    <nav>
      <ul>
        <li id="home">Home</li>
        <li id="intro">Intro</li>
        <li id="server">Server</li>
      </ul>
    </nav>
    <section id="displayArea">
    </section>
    <aside>
      <ul>
        <li>GooglePlus</li>
        <lu>FacebookOne</li>
        <li>TwitterYou</li>
      </ul>
      </asid>
    <footer>
      <p>&copy; 2021 Made by Korea. All rights reserved.</p>
    </footer>
  </body>
</html>

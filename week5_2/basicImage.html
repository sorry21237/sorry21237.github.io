<!DOCTYPE html> <!-- basicImage.html -->
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>HTML5 Image Training</title>
  </head>
  <body>
    <figure>
      <h3>SNS site</h3>
      <a href="https://www.google.com">
        <img src="../images/googlePlus.png" alt="Google"/><br/>
        <figcaption>(Image)Google Link</figcaption>
      </a>
      <a href="https://facebook.com">
        <img src="../images/facebookOne.png" alt="Facebook"/><br/>
        <figcaption>(Image)Facebook Link</figcaption>
      </a>
      <a href="https://www.twitter.com">
        <img src="../images/twitterYou.png" alt="Twitter"/><br/>
        <figcaption>(Image)Twitter Link</figcaption>
      </a>
    </figure>
  </body>
</html>

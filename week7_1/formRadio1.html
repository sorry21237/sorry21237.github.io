<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=divece-width, initial-scale=1"/>
    <title> HTML5 form Training</title>
  </head>
  <body>
    <section>
      <form action="http://jsptogo.herokuapp.com/jspsrc/formRadio1.jsp" method="post">
        <fieldset>
          <legend>Gender Choice</legend>
          <label for="malex">Male</label>
          <input type="radio" id="malex" name="gender" value="male" checked/>
          <label for="femalex">Female</label>
          <input type="radio" id="femalex" name="gender" value="female" checked/>
          <button type="submit">Input</button>
        </fieldset>
      </form>
    </section>
  </body>
</html>

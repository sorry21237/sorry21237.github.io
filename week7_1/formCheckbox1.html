<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=divece-width, initial-scale=1"/>
    <title> HTML5 CheckBox Training</title>
  </head>
  <body>
    <section>
      <form action="http://jsptogo.herokuapp.com/jspsrc/formCheckbox1.jsp" method="post">
        <fieldset>
          <legend>Choose Hobby</legend>
          <label for="fishing">Fishing</label>
          <input type="checkbox" id="fishing" name="hobby" value="fishing" checked/>
          <label for="singing">Singing</label>
          <input type="checkbox" id="singing" name="hobby" value="singing" />
          <label for="reading">Reading</label>
          <input type="checkbox" id="reading" name="hobby" value="reading"/>
        </fieldset>
      </form>
    </section>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=divece-width, initial-scale=1"/>
    <title> HTML5 Audio Training</title>
  </head>
  <body>
    <h4> Audio Tag </h4>
    <audio controls="controls">
      <source src="./boom.ogg" type="audio/ogg">
      <source src="./boom.mp3" type="audio/mp3">

    </audio><hr/>

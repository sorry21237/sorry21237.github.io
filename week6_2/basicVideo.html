<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=divece-width, initial-scale=1"/>
    <title> HTML5 Video Training</title>
  </head>
  <body>
    <h4> Video Tag 1 320*200 </h4>
    <video controls="controls" height="320" width="200">
      <source src="../media/traffic.mp4" type="video/mp4">
      <source src="../media/traffic.ogg" type="video/ogg">
      <source src="../media/traffic.webm" type="video/webm">
      The browser does not support it or the video format file does not exist.
    </video><hr/>
    <h4> Video Tag 2 </h4>
    <video controls="controls">
      <source src="../media/traffic.mp4" type="video/mp4">
      <source src="../media/traffic.ogg" type="video/ogg">
      <source src="../media/traffic.webm" type="video/webm">
      The browser does not support it or the video format file does not exist.
    </video><hr/>
  </body>
</html>
